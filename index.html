<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f6e52" />
  <title>QR Scanner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="app__header">
      <h1>QR Scanner</h1>
      <p class="app__subtitle">Scan a QR code with your camera or upload an image to read the data inside it.</p>
    </header>

    <section class="card">
      <!-- Preview area: shows placeholder, live camera, or uploaded image -->
      <div class="preview" id="preview">
        <video id="video" class="preview__video" playsinline muted></video>
        <img id="image" class="preview__image" alt="Selected image" hidden />
        <div class="preview__placeholder" id="placeholder">
          <span class="preview__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 7V5a1 1 0 0 1 1-1h2M17 4h2a1 1 0 0 1 1 1v2M20 17v2a1 1 0 0 1-1 1h-2M7 20H5a1 1 0 0 1-1-1v-2"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
          </span>
          <p id="placeholder-text">Camera preview will appear here</p>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn--primary" id="btn-camera">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
          <span id="btn-camera-label">Start camera</span>
        </button>
        <button class="btn btn--ghost" id="btn-upload">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 16V4m0 0L8 8m4-4 4 4M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
          </svg>
          <span>Upload image</span>
        </button>
        <input type="file" id="file-input" accept="image/*" hidden />
      </div>

      <p class="controls__msg" id="copy-msg" role="status" aria-live="polite" hidden></p>
    </section>

    <!-- Structured result -->
    <section class="result" id="result" hidden>
      <div class="result__head">
        <span class="result__badge" id="result-badge">TEXT</span>
        <span class="result__title" id="result-title">Decoded data</span>
      </div>

      <dl class="fields" id="fields"></dl>

      <details class="raw">
        <summary>Show raw data</summary>
        <pre class="raw__text" id="raw-text"></pre>
      </details>

      <div class="result__actions">
        <button class="btn btn--primary" id="btn-copy">Copy</button>
        <button class="btn btn--ghost" id="btn-clear">Scan again</button>
      </div>
    </section>

    <p class="status" id="status" role="status" aria-live="polite"></p>
  </main>

  <canvas id="canvas" hidden></canvas>

  <script src="vendor/jsQR.js"></script>
  <script src="app.js"></script>
</body>
</html>
